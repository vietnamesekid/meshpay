name: Bug Report
description: Report a bug or unexpected behavior
labels: [bug, needs-triage]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to file a bug report. Please fill in as much detail as possible.

  - type: input
    id: package
    attributes:
      label: Package
      description: Which package is affected?
      placeholder: "@meshpay/adapters"
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: Version
      placeholder: "0.2.0"
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear description of the bug.
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Reproduction
      description: Minimal code snippet or steps to reproduce.
      render: typescript
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true

  - type: textarea
    id: environment
    attributes:
      label: Environment
      value: |
        - Node version:
        - pnpm version:
        - OS:
        - Chain:
    validations:
      required: true
