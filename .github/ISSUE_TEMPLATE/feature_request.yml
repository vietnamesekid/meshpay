name: Feature Request
description: Propose a new feature or improvement
labels: [enhancement, needs-triage]
body:
  - type: markdown
    attributes:
      value: |
        Before opening a feature request, please search existing issues and discussions.

  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What problem does this solve? What are you trying to do?
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: Describe what you'd like to see.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other approaches you've thought about.

  - type: dropdown
    id: scope
    attributes:
      label: Which package(s) does this affect?
      multiple: true
      options:
        - "@meshpay/core"
        - "@meshpay/wallet"
        - "@meshpay/protocols"
        - "@meshpay/adapters"
        - "@meshpay/cli"
        - New package
